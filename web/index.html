<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamarr</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/css/app.css">
<!-- Tailwind Play runtime, vendored: UI works offline and CSP stays script-src 'self' -->
<script src="/static/js/vendor/tailwind.js"></script>
<script src="/static/js/tailwind-config.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen">

<!-- Toast Container -->
<div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 max-w-sm"></div>

<!-- Main App -->
<div class="min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>
        </div>
        <div>
          <h1 class="text-lg font-bold text-white leading-tight">Gamarr</h1>
          <p class="text-xs text-slate-400 hidden sm:block">Game Search &amp; Download</p>
        </div>
      </div>
      <span id="header-stats" class="text-xs text-slate-500 hidden sm:block"></span>
      <div class="hamburger sm:hidden" id="hamburger-btn" data-action="toggleMobileNav"><span></span></div>
    </div>
    <div class="nav-overlay" id="nav-overlay" data-action="toggleMobileNav"></div>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 relative">
      <nav class="flex gap-1 -mb-px overflow-x-auto mobile-nav" id="main-nav">
        <button data-action="switchTab" class="nav-tab active px-4 py-2.5 text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-colors whitespace-nowrap" data-tab="search">
          <svg class="w-4 h-4 inline mr-1.5 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>Search
        </button>
        <button data-action="switchTab" class="nav-tab px-4 py-2.5 text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-colors whitespace-nowrap" data-tab="library">
          <svg class="w-4 h-4 inline mr-1.5 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z"/></svg>Library
        </button>
        <button data-action="switchTab" class="nav-tab px-4 py-2.5 text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-colors whitespace-nowrap relative" data-tab="downloads">
          <svg class="w-4 h-4 inline mr-1.5 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>Downloads
          <span id="dl-badge" class="hidden ml-1 px-1.5 py-0.5 text-xs bg-indigo-600 text-white rounded-full"></span>
        </button>
        <button data-action="switchTab" class="nav-tab px-4 py-2.5 text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-colors whitespace-nowrap" data-tab="wishlist">
          <svg class="w-4 h-4 inline mr-1.5 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>Wishlist
        </button>
        <button data-action="switchTab" class="nav-tab px-4 py-2.5 text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-colors whitespace-nowrap" data-tab="settings">
          <svg class="w-4 h-4 inline mr-1.5 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Settings
        </button>
      </nav>
    </div>
  </header>

  <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-6">

    <!-- Search Tab -->
    <div class="tab-content active" id="tab-search">
      <div class="flex flex-col sm:flex-row gap-3 mb-6">
        <input type="text" id="search-input" placeholder="Search for games..." class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
        <select id="platform-filter" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-slate-300 focus:outline-none focus:border-indigo-500"></select>
        <button data-action="doSearch" id="search-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-6 py-2.5 rounded-lg transition-colors whitespace-nowrap">Search</button>
      </div>
      <div id="search-info" class="text-sm text-slate-500 mb-4"></div>
      <div id="results" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3"></div>
    </div>

    <!-- Library Tab -->
    <div class="tab-content" id="tab-library">
      <div class="flex flex-col sm:flex-row gap-3 mb-6">
        <input type="text" id="lib-search" placeholder="Filter library..." class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500">
        <select id="lib-platform" data-action-change="loadLibrary" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-slate-300"></select>
        <div class="flex gap-2">
          <a id="romm-link" target="_blank" class="bg-emerald-600/20 text-emerald-400 border border-emerald-600/30 hover:bg-emerald-600/30 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors whitespace-nowrap inline-flex items-center">RomM</a>
          <a id="gamevault-link" target="_blank" class="bg-orange-600/20 text-orange-400 border border-orange-600/30 hover:bg-orange-600/30 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors whitespace-nowrap inline-flex items-center">GameVault</a>
        </div>
      </div>
      <div id="lib-stats" class="text-sm text-slate-500 mb-4"></div>
      <div id="library-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
      <div id="lib-pagination" class="flex justify-center gap-2 mt-6"></div>
    </div>

    <!-- Downloads Tab -->
    <div class="tab-content" id="tab-downloads">
      <div class="flex gap-3 mb-4">
        <button data-action="clearFinished" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 px-4 py-2 rounded-lg text-sm transition-colors">Clear Finished</button>
      </div>
      <div id="downloads" class="space-y-3"></div>
    </div>

    <!-- Wishlist Tab -->
    <div class="tab-content" id="tab-wishlist">
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 mb-6">
        <h3 class="text-sm font-semibold text-slate-300 mb-3">Add to Wishlist</h3>
        <div class="flex flex-col sm:flex-row gap-3">
          <input type="text" id="wish-title" placeholder="Game title" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500">
          <select id="wish-platform" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-slate-300"></select>
          <button data-action="addWishlist" class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-5 py-2 rounded-lg transition-colors whitespace-nowrap">Add</button>
        </div>
      </div>
      <div id="wishlist" class="space-y-2"></div>
    </div>

    <!-- Settings Tab -->
    <div class="tab-content" id="tab-settings">
      <div class="space-y-6">
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
          <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4">Connection Tests</h3>
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <button data-action="testConn" data-service="prowlarr" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg p-3 text-left transition-colors">
              <div class="text-sm font-medium text-white">Prowlarr</div>
              <div class="text-xs text-slate-500 mt-1" id="test-prowlarr-status">Not tested</div>
            </button>
            <button data-action="testConn" data-service="qbittorrent" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg p-3 text-left transition-colors">
              <div class="text-sm font-medium text-white">qBittorrent</div>
              <div class="text-xs text-slate-500 mt-1" id="test-qbittorrent-status">Not tested</div>
            </button>
            <button data-action="testConn" data-service="sabnzbd" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg p-3 text-left transition-colors">
              <div class="text-sm font-medium text-white">SABnzbd</div>
              <div class="text-xs text-slate-500 mt-1" id="test-sabnzbd-status">Not tested</div>
            </button>
          </div>
        </div>
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
          <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4">Search Sources</h3>
          <div id="settings-sources" class="space-y-2"></div>
        </div>
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
          <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4">Collection Stats</h3>
          <div id="settings-stats"></div>
        </div>
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
          <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4">Options</h3>
          <label class="flex items-center gap-3 cursor-pointer">
            <input type="checkbox" id="setting-extract" data-action-change="saveExtractSetting" class="accent-indigo-500 w-4 h-4">
            <div><div class="text-sm text-white">Extract archives after download</div><div class="text-xs text-slate-500">Auto-extract RAR/ZIP/7z in ROM downloads</div></div>
          </label>
        </div>
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wider">AI Monitor</h3>
            <button data-action="triggerAnalysis" class="bg-indigo-600/20 text-indigo-400 border border-indigo-600/30 hover:bg-indigo-600/30 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors">Analyze Now</button>
          </div>
          <div id="monitor-info" class="space-y-3"></div>
        </div>
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
          <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4">Recent Activity</h3>
          <div id="activity-log" class="space-y-1 max-h-64 overflow-y-auto"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
