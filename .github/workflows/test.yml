name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build
        run: go build -o gamarr ./cmd/gamarr/
      - name: Verify binary
        run: ls -lh gamarr
      - name: Run tests
        run: go test ./... -v -count=1
