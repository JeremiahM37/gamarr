name: CodeQL
on:
  # No pull_request trigger: PR-gating CodeQL produced too many false
  # positives. Scanning still runs on every push to main and weekly.
  push:
    branches: [main]
  schedule:
    # Weekly scan so a published-after-merge CVE in a dependency surfaces.
    - cron: '23 4 * * 1'
permissions:
  actions: read
  contents: read
  security-events: write
jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-and-quality
      - uses: actions/setup-go@v5
        with: {go-version: '1.25.x', cache: false, check-latest: true}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
